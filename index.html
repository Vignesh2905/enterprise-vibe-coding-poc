<html>
  <head>
    <style>
      /* Styles for product cards */
      .product-card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      
      /* Styles for cart */
      .cart {
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      
      /* Styles for cart items */
      .cart-item {
        display: flex;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #ccc;
      }
      
      /* Styles for cart total */
      .cart-total {
        padding: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- Product catalogue page -->
    <div class="product-card">
      <img src="https://via.placeholder.com/150" alt="Product image">
      <div>
        <h2>Product Name</h2>
        <p>Product description</p>
        <button>Add to cart</button>
      </div>
    </div>
    
    <!-- Cart page -->
    <div class="cart">
      <h2>Cart</h2>
      <div class="cart-item">
        <img src="https://via.placeholder.com/50" alt="Product image">
        <div>
          <h2>Product Name</h2>
          <p>Product description</p>
          <button_remove</button>
        </div>
        <span>Price</span>
      </div>
      <div class="cart-total">Cart total: $0.00</div>
      <button>Checkout</button>
    </div>
    
    <script>
      // Add to cart functionality
      document.addEventListener("DOMContentLoaded", function () {
        const addButtons = document.querySelectorAll(".product-card button.add-to-cart");
        addButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            // Add product to cart
            const cart = JSON.parse(localStorage.getItem("cart")) || {};
            cart[button.dataset.productId] = {
              name: "",
              price: "",
            };
            localStorage.setItem("cart", JSON.stringify(cart));
            // Update cart total
            const cartTotal = document.querySelector(".cart-total");
            const cartItems = JSON.parse(localStorage.getItem("cart"));
            let total = 0;
            Object.values(cartItems).forEach(function (item) {
              total += parseFloat(item.price);
            });
            cartTotal.textContent = `Cart total: $${total.toFixed(2)}`;
          });
        });
      
        // Remove item from cart functionality
        const removeButtons = document.querySelectorAll(".cart-item button.remove");
        removeButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            // Remove item from cart
            const cart = JSON.parse(localStorage.getItem("cart"));
            delete cart[button.dataset.productId];
            localStorage.setItem("cart", JSON.stringify(cart));
            // Update cart total
            const cartTotal = document.querySelector(".cart-total");
            const cartItems = JSON.parse(localStorage.getItem("cart"));
            let total = 0;
            Object.values(cartItems).forEach(function (item) {
              total += parseFloat(item.price);
            });
            cartTotal.textContent = `Cart total: $${total.toFixed(2)}`;
          });
        });
      });
    </script>
  </body>
</html>
