<html>

<head>
  <style>
    /* Global Styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    /* Product Card Styles */
    .product-card {
      width: 300px;
      height: 200px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }

    /* Cart Styles */
    .cart {
      position: fixed;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    /* Cart Item Styles */
    .cart-item {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    /* Cart Total Styles */
    .cart-total {
      font-weight: bold;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>

<body>
  <header>
    <h1>Product Catalogue</h1>
  </header>

  <main>
    <section class="product-cards">
      <!-- Product Cards -->
      <div class="product-card">
        <img src="#" alt="Product 1">
        <h2>Dell XPS 15 Laptop</h2>
        <p>$1,299.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="#" alt="Product 2">
        <h2>Apple Magic Keyboard</h2>
        <p>$129.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="#" alt="Product 3">
        <h2>Logitech MX Master 3 Mouse</h2>
        <p>$99.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="#" alt="Product 4">
        <h2>Samsung 27-inch 4K Monitor</h2>
        <p>$449.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="#" alt="Product 5">
        <h2>Sony WH-1000XM5 Headphones</h2>
        <p>$349.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="#" alt="Product 6">
        <h2>Apple iPad Pro 12.9</h2>
        <p>$1,099.99</p>
        <button>Add to Cart</button>
      </div>
    </section>

    <aside class="cart">
      <h2>Cart</h2>
      <ul class="cart-items">
        <!-- Cart Items -->
      </ul>
      <div class="cart-total">
        <p>Cart Total: $0.00</p>
      </div>
      <button>Proceed to Checkout</button>
    </aside>
  </main>

  <script>
    // Cart Variables
    let cartItems = [];
    let cartTotal = 0.00;

    // Add Product to Cart
    document.querySelectorAll('.product-card button').forEach(button => {
      button.addEventListener('click', () => {
        const product = button.parentNode;
        const productName = product.querySelector('h2').textContent;
        const productPrice = parseFloat(product.querySelector('p').textContent.replace('$', ''));

        // Check if item is already in cart
        const existingItem = cartItems.find(item => item.name === productName);
        if (existingItem) {
          existingItem.quantity += 1;
          cartTotal += productPrice;
          updateCart();
        } else {
          cartItems.push({ name: productName, quantity: 1, price: productPrice });
          cartTotal += productPrice;
          updateCart();
        }
      });
    });

    // Update Cart
    function updateCart() {
      const cartItemsElement = document.querySelector('.cart-items');
      cartItemsElement.innerHTML = '';
      cartItems.forEach(item => {
        const cartItemElement = document.createElement('li');
        cartItemElement.innerHTML = `
          <span>${item.name} x ${item.quantity}</span>
          <span>$${(item.quantity * item.price).toFixed(2)}</span>
        `;
        cartItemsElement.appendChild(cartItemElement);
      });
      const cartTotalElement = document.querySelector('.cart-total');
      cartTotalElement.textContent = `Cart Total: $${cartTotal.toFixed(2)}`;
    }

    // Remove Product from Cart
    document.querySelectorAll('.cart-item button').forEach(button => {
      button.addEventListener('click', () => {
        const product = button.parentNode.parentNode;
        const productName = product.querySelector('span:first-child').textContent;
        const productPrice = parseFloat(product.querySelector('span:last-child').textContent.replace('$', ''));

        // Remove item from cart
        const existingItem = cartItems.find(item => item.name === productName);
        if (existingItem) {
          cartItems.splice(cartItems.indexOf(existingItem), 1);
          cartTotal -= productPrice;
          updateCart();
        }
      });
    });
  </script>
</body>

</html>
