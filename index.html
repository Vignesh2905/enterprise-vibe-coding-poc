<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalogue</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .product-card {
            width: 400px;
            height: 200px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 20px;
        }
        
        .shopping-cart {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        .cart-item {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .cart-item .name {
            font-weight: bold;
        }
        
        .cart-item .price {
            color: #1A8754;
        }
        
        .cart-item .remove {
            float: right;
        }
        
        .checkout-button {
            background-color: #1A8754;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .checkout-button:hover {
            background-color: #1A8754;
            color: #fff;
        }
    </style>
</head>
<body>
    <script>
        let cart = [];
        let total = 0;
        
        function addProductToCart(product) {
            cart.push(product);
            total += product.price;
            document.getElementById('cart-total').innerHTML = `Total: $${total.toFixed(2)}`;
            updateCart();
        }
        
        function removeProductFromCart(index) {
            total -= cart[index].price;
            cart.splice(index, 1);
            document.getElementById('cart-total').innerHTML = `Total: $${total.toFixed(2)}`;
            updateCart();
        }
        
        function updateCart() {
            let cartContainer = document.getElementById('cart-container');
            cartContainer.innerHTML = '';
            cart.forEach((product, index) => {
                let cartItem = document.createElement('div');
                cartItem.classList.add('cart-item');
                cartItem.innerHTML = `
                    <div class="name">${product.name}</div>
                    <div class="price">$${product.price.toFixed(2)}</div>
                    <div class="remove" onClick="removeProductFromCart(${index})">Remove</div>
                `;
                cartContainer.appendChild(cartItem);
            });
        }
        
        function checkout() {
            alert(`Order Total: $${total.toFixed(2)}`);
        }
        
        let products = [
            { name: 'Dell XPS 15 Laptop', price: 1299.99, image: 'https://picsum.photos/400/200?random=1' },
            { name: 'Apple Magic Keyboard', price: 129.99, image: 'https://picsum.photos/400/200?random=2' },
            { name: 'Logitech MX Master 3 Mouse', price: 99.99, image: 'https://picsum.photos/400/200?random=3' },
            { name: 'Samsung 27-inch 4K Monitor', price: 449.99, image: 'https://picsum.photos/400/200?random=4' },
            { name: 'Sony WH-1000XM5 Headphones', price: 349.99, image: 'https://picsum.photos/400/200?random=5' },
            { name: 'Apple iPad Pro 12.9', price: 1099.99, image: 'https://picsum.photos/400/200?random=6' },
        ];
        
        products.forEach((product, index) => {
            let productCard = document.createElement('div');
            productCard.classList.add('product-card');
            productCard.innerHTML = `
                <img src="${product.image}" height="150" />
                <div class="name">${product.name}</div>
                <div class="price">$${product.price.toFixed(2)}</div>
                <button onClick="addProductToCart(${JSON.stringify(product)})">Add to Cart</button>
            `;
            document.getElementById('product-catalogue').appendChild(productCard);
        });
    </script>
    <div class="product-catalogue">
        <h1>Product Catalogue</h1>
        <div id="product-catalogue"></div>
    </div>
    <div class="shopping-cart">
        <h1>Shopping Cart</h1>
        <div id="cart-container"></div>
        <p id="cart-total"></p>
        <button class="checkout-button" onClick="checkout()">Checkout</button>
    </div>
</body>
</html>
