<html>
<head>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }
  .product-image {
    height: 160px;
    background: #E8F4FD;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px 8px 0 0;
  }
  .product-emoji {
    font-size: 64px;
  }
  .header {
    background: #1B4F72;
    color: #fff;
    padding: 10px;
    text-align: center;
  }
  .card {
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
  .cart {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Product Catalogue</h1>
  </div>
  <div class="products">
    <div class="product" onclick="addProduct('Dell XPS 15 Laptop', 1299.99)">
      <div class="product-image">
        <span class="product-emoji">💻</span>
      </div>
      <h2>Dell XPS 15 Laptop</h2>
      <p>$1,299.99</p>
    </div>
    <div class="product" onclick="addProduct('Apple Magic Keyboard', 129.99)">
      <div class="product-image">
        <span class="product-emoji">⌨️</span>
      </div>
      <h2>Apple Magic Keyboard</h2>
      <p>$129.99</p>
    </div>
    <!-- rest of the products -->
  </div>
  <div class="cart">
    <h2>Cart</h2>
    <ul id="cartList">
      <!-- cart items will be displayed here -->
    </ul>
    <p id="cartTotal">$0.00</p>
    <button onclick="checkout()">Proceed to Checkout</button>
  </div>
  <script>
    const cart = [];
    const cartList = document.getElementById('cartList');
    const cartTotal = document.getElementById('cartTotal');

    function addProduct(name, price) {
      cart.push({ name, price });
      displayCart();
    }

    function removeProduct(index) {
      cart.splice(index, 1);
      displayCart();
    }

    function displayCart() {
      cartList.innerHTML = '';
      let total = 0;
      cart.forEach((product, index) => {
        const li = document.createElement('li');
        li.textContent = `${product.name}: $${product.price}`;
        const removeButton = document.createElement('button');
        removeButton.textContent = 'Remove';
        removeButton.onclick = () => removeProduct(index);
        li.appendChild(removeButton);
        cartList.appendChild(li);
        total += product.price;
      });
      cartTotal.textContent = `$${total.toFixed(2)}`;
    }

    function checkout() {
      alert(`Your total is: $${cart.reduce((a, b) => a + b.price, 0).toFixed(2)}`);
    }
  </script>
</body>
</html>
